    <style>
      .history-shell { padding: 20px 0 40px; }
      .history-hero-card,
      .history-category,
      .history-detail,
      .history-months {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)),
          linear-gradient(135deg, rgba(16, 24, 39, 0.96), rgba(8, 13, 24, 0.96));
        border: 1px solid rgba(174, 199, 228, 0.15);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.26);
        border-radius: 22px;
      }
      .history-hero-card {
        padding: 30px 32px;
        text-align: center;
        margin-bottom: 18px;
      }
      .history-hero-card p { max-width: 72ch; margin: 14px auto 0; color: var(--muted); line-height: 1.8; }
      .history-months {
        display: flex; flex-wrap: wrap; gap: 12px; padding: 14px; margin-bottom: 22px;
      }
      .history-month-chip {
        border: 1px solid rgba(174, 199, 228, 0.14);
        background: rgba(255,255,255,0.035);
        color: var(--muted);
        border-radius: 8px;
        padding: 12px 14px;
        cursor: pointer;
        display: grid;
        gap: 4px;
        min-width: 138px;
        text-align: left;
      }
      .history-month-chip strong { color: var(--heading); font-size: 0.95rem; }
      .history-month-chip.active { border-color: rgba(126,231,255,0.36); background: rgba(126,231,255,0.08); }
      .history-layout {
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }
      .history-sidebar { display: grid; gap: 14px; content-visibility: auto; contain-intrinsic-size: 1200px; }
      .history-category { overflow: hidden; }
      .history-category-head {
        width: 100%; border: 0; background: transparent; color: var(--heading); cursor: pointer;
        display: flex; justify-content: space-between; align-items: center; gap: 12px;
        padding: 18px 20px; text-align: left;
      }
      .history-category-head small { display: block; margin-top: 6px; color: var(--muted); }
      .history-category-chevron { color: var(--muted); transition: transform .18s ease; }
      .history-category.open .history-category-chevron { transform: rotate(180deg); }
      .history-list { display: none; padding: 0 14px 14px; content-visibility: auto; contain-intrinsic-size: 600px; }
      .history-category.open .history-list { display: grid; gap: 10px; }
      .history-item {
        border-radius: 12px; padding: 16px; background: rgba(255,255,255,0.03);
        border: 1px solid rgba(174, 199, 228, 0.12); cursor: pointer;
        content-visibility: auto; contain-intrinsic-size: 140px;
      }
      .history-item:hover,
      .history-item.active { border-color: rgba(126,231,255,0.34); background: rgba(126,231,255,0.07); }
      .history-item h3 { margin: 0 0 8px; font-size: 1rem; line-height: 1.32; }
      .history-item p { margin: 0; color: var(--muted); line-height: 1.6; font-size: 0.93rem; }
      .history-item-top { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
      .history-detail { min-height: 640px; overflow: hidden; content-visibility: auto; contain-intrinsic-size: 900px; }
      .history-detail-body { padding: 0 0 28px; }
      .history-detail-body > *:not(.story-hero) {
        width: min(100% - 48px, 760px);
        margin-left: auto; margin-right: auto;
      }
      .history-detail .story-hero { min-height: 240px; }
      .history-empty { padding: 28px; color: var(--muted); }
      @media (max-width: 900px) {
        .history-layout { grid-template-columns: 1fr; }
        .history-shell { padding-top: 12px; }
        .history-hero-card { padding: 22px 18px; margin-bottom: 14px; }
        .history-months { gap: 10px; padding: 12px; margin-bottom: 16px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
        .history-month-chip { min-width: 132px; flex: 0 0 auto; }
        .history-sidebar { gap: 10px; }
        .history-category-head { padding: 16px; }
        .history-item { padding: 14px; }
        .history-item h3 { font-size: 0.96rem; }
        .history-item p { font-size: 0.9rem; line-height: 1.5; }
        .history-detail { min-height: 0; }
        .history-detail-body > *:not(.story-hero) { width: min(100% - 28px, 760px); }
        .history-detail .story-hero { min-height: 180px; }
      }
